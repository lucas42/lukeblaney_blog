server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    location /_info {
        alias /usr/share/nginx/html/_info.json;
        default_type application/json;
    }

    location / {
        try_files $uri $uri/ =404;
    }

    error_page 404 /404.html;
}
