baseURL = "https://blog.lukeblaney.co.uk/"
languageCode = "en-gb"
title = "Luke's Blog"
theme = "lucos-blog-theme"
[pagination]
  pagerSize = 10

[params]
  description = "A personal blog by Luke Blaney"

[taxonomies]
  tag = "tags"

[[menus.main]]
  name = "About"
  url = "https://lukeblaney.co.uk/"
  weight = 1
[[menus.main]]
  name = "Projects"
  url = "https://lukeblaney.co.uk/projects/"
  weight = 2
[[menus.main]]
  name = "CV"
  url = "https://lukeblaney.co.uk/cv"
  weight = 3
[[menus.main]]
  name = "Contact"
  url = "https://lukeblaney.co.uk/contact"
  weight = 4
[[menus.main]]
  name = "Blog"
  url = "/"
  weight = 5

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
  [markup.highlight]
    style = "github"
    lineNos = false
    noClasses = true
