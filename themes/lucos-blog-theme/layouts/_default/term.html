{{ define "main" }}
<h1>Posts tagged "{{ .Title }}"</h1>
<ul class="post-list">
  {{ range .Paginator.Pages }}
  <li class="post-item">
    <time datetime="{{ .Date.Format "2006-01-02" }}">{{ .Date.Format "2 January 2006" }}</time>
    <a href="{{ .RelPermalink }}">{{ .Title }}</a>
  </li>
  {{ end }}
</ul>
{{ template "_internal/pagination.html" . }}
{{ end }}
