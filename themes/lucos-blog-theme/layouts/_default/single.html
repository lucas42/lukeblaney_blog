{{ define "main" }}
<article class="post">
  <header>
    <h1>{{ .Title }}</h1>
    <time datetime="{{ .Date.Format "2006-01-02" }}">{{ .Date.Format "2 January 2006" }}</time>
    {{ with .Params.tags }}
    <div class="tags">
      {{ range . }}<a href="{{ "/tags/" }}{{ . | urlize }}/" class="tag">{{ . }}</a> {{ end }}
    </div>
    {{ end }}
  </header>
  <div class="post-content">
    {{ .Content }}
  </div>
  <nav class="post-nav">
    {{ with .PrevInSection }}<a class="post-nav-prev" href="{{ .RelPermalink }}">&larr; {{ .Title }}</a>{{ end }}
    {{ with .NextInSection }}<a class="post-nav-next" href="{{ .RelPermalink }}">{{ .Title }} &rarr;</a>{{ end }}
  </nav>
</article>
{{ end }}
